# =============================================================================
# SureVote — Docker Compose (Full Stack)
# Frontend (Angular + Nginx) + Backend (Spring Boot) + Database (PostgreSQL)
# =============================================================================

services:
  # ---------- Frontend ----------
  frontend:
    image: surevote-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - surevote-net

  # ---------- Backend ----------
  backend:
    image: surevote-backend:latest
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=surevote
      - DB_USERNAME=surevote
      - DB_PASSWORD=${DB_PASSWORD:-surevote_secret}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - surevote-net

  # ---------- Database ----------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: surevote
      POSTGRES_USER: surevote
      POSTGRES_PASSWORD: ${DB_PASSWORD:-surevote_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surevote"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - surevote-net

volumes:
  pgdata:

networks:
  surevote-net:
    driver: bridge
